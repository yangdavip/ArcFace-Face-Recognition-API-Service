version: '3.8'

services:
  api:
    build: .
    container_name: arcface-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./face_recognition.db}
      - PYTHONUNBUFFERED=1
      - LANG=zh_CN.UTF-8
      # GPU 支持：启用 NVIDIA GPU 运行时
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/'); exit(0) if r.status==200 else exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - arcface-network

  # PostgreSQL 数据库服务（可选）
  db:
    image: postgres:15
    container_name: arcface-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=face_recognition
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcface-network

networks:
  arcface-network:
    driver: bridge

volumes:
  pgdata:
